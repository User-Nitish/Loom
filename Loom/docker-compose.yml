services:
  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - CLASSIFIER_API_URL=http://classifier:5000/classify
    env_file:
      - ./server/.env
    networks:
      - loom-network

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - loom-network

  classifier:
    build: ./classifier_server
    ports:
      - "5000:5000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    networks:
      - loom-network

networks:
  loom-network:
    driver: bridge

volumes:
  hf_cache:
